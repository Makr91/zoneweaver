name: Production Build

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to build'
        required: true
        type: string
      tag_name:
        description: 'GitHub release tag'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: true
        type: string
      tag_name:
        description: 'GitHub release tag'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-production-packages:
    name: Packages
    runs-on: self-hosted
    steps:
      # Debian Build Steps
      - name: Checkout for Debian build
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Fetch Hyperweaver UI artifact
        run: |
          UI_VERSION=$(node -p "require('./package.json').hyperweaverUiVersion")
          echo "Fetching Hyperweaver UI v${UI_VERSION}"
          mkdir -p ui
          curl -fsSL "https://github.com/MarkProminic/hyperweaver-ui/releases/download/v${UI_VERSION}/hyperweaver-ui-${UI_VERSION}.tar.gz" | tar -xz -C ui

      - name: Generate OpenAPI spec (published as a release asset)
        run: npm run generate-docs

      - name: Set Debian package variables
        run: |
          echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          echo "PACKAGE_NAME=hyperweaver-server" >> $GITHUB_ENV
          echo "ARCH=amd64" >> $GITHUB_ENV
          echo "TAG_NAME=${{ inputs.tag_name }}" >> $GITHUB_ENV

      - name: Create Debian package structure
        run: |
          mkdir -p "${PACKAGE_NAME}_${VERSION}_${ARCH}"/{opt/hyperweaver-server,etc/hyperweaver-server,etc/systemd/system,var/lib/hyperweaver-server,var/log/hyperweaver-server,usr/share/man/man8,usr/share/man/man5,DEBIAN}

      - name: Copy application files to Debian package
        run: |
          cp -r controllers models routes auth config utils scripts index.js package.json "${PACKAGE_NAME}_${VERSION}_${ARCH}/opt/hyperweaver-server/"
          cp -r node_modules "${PACKAGE_NAME}_${VERSION}_${ARCH}/opt/hyperweaver-server/"
          cp -r ui "${PACKAGE_NAME}_${VERSION}_${ARCH}/opt/hyperweaver-server/ui"

      - name: Copy configuration files to Debian package
        run: |
          cp packaging/config/production-config.yaml "${PACKAGE_NAME}_${VERSION}_${ARCH}/etc/hyperweaver-server/config.yaml"
          cp packaging/DEBIAN/systemd/hyperweaver-server.service "${PACKAGE_NAME}_${VERSION}_${ARCH}/etc/systemd/system/"
          cp packaging/DEBIAN/postinst packaging/DEBIAN/prerm packaging/DEBIAN/postrm "${PACKAGE_NAME}_${VERSION}_${ARCH}/DEBIAN/"

      - name: Install man pages
        run: |
          # Copy and compress man pages following Debian Policy
          gzip -9 -c packaging/DEBIAN/man/hyperweaver-server.8 > "${PACKAGE_NAME}_${VERSION}_${ARCH}/usr/share/man/man8/hyperweaver-server.8.gz"
          gzip -9 -c packaging/DEBIAN/man/hyperweaver-server.yaml.5 > "${PACKAGE_NAME}_${VERSION}_${ARCH}/usr/share/man/man5/hyperweaver-server.yaml.5.gz"

      - name: Create Debian control file
        run: |
          cat > "${PACKAGE_NAME}_${VERSION}_${ARCH}/DEBIAN/control" << EOF
          Package: hyperweaver-server
          Version: ${VERSION}
          Section: misc
          Priority: optional
          Architecture: ${ARCH}
          Maintainer: Makr91 <makr91@users.noreply.github.com>
          Depends: nodejs (>= 22.0.0), sqlite3, openssl
          Description: Hyperweaver Server - hypervisor control-plane web interface
           Aggregates and proxies host agents (Zoneweaver Agent for Bhyve/OmniOS,
           Hyperweaver Agent for VirtualBox) and serves the Hyperweaver UI.
          Homepage: https://github.com/Makr91/hyperweaver-server
          EOF

      - name: Set Debian package permissions
        run: |
          find "${PACKAGE_NAME}_${VERSION}_${ARCH}" -type d -exec chmod 755 {} \;
          find "${PACKAGE_NAME}_${VERSION}_${ARCH}" -type f -exec chmod 644 {} \;
          chmod 755 "${PACKAGE_NAME}_${VERSION}_${ARCH}/DEBIAN"/{postinst,prerm,postrm}

      - name: Build Debian package
        run: |
          dpkg-deb --build "${PACKAGE_NAME}_${VERSION}_${ARCH}" "${PACKAGE_NAME}_${VERSION}_${ARCH}.deb"

      - name: Install GitHub CLI
        run: |
          if ! command -v gh &> /dev/null; then
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt update
            sudo apt install gh -y
          fi

      - name: Upload Debian package and OpenAPI spec to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${TAG_NAME}" "${PACKAGE_NAME}_${VERSION}_${ARCH}.deb" openapi.json --clobber

      - name: Upload Debian package to repository server
        run: |
          rsync -av hyperweaver-server_*.deb startcloud@66.6.204.177:/tmp/

      - name: Add package to repository pool
        run: |
          ssh startcloud@66.6.204.177 "
            mkdir -p /local/public/debian/pool/main/h/hyperweaver-server
            cp /tmp/hyperweaver-server_*.deb /local/public/debian/pool/main/h/hyperweaver-server/
          "

      - name: Create multi-suite directory structure
        run: |
          ssh startcloud@66.6.204.177 "
            cd /local/public/debian
            mkdir -p dists/bookworm/main/binary-amd64
            mkdir -p dists/trixie/main/binary-amd64
          "

      - name: Update repository Packages files for all suites
        run: |
          ssh startcloud@66.6.204.177 "
            cd /local/public/debian
            for suite in bookworm trixie; do
              dpkg-scanpackages --arch amd64 pool/ > dists/\$suite/main/binary-amd64/Packages
              gzip -c dists/\$suite/main/binary-amd64/Packages > dists/\$suite/main/binary-amd64/Packages.gz
            done
          "

      - name: Generate Release files for all suites
        run: |
          ssh startcloud@66.6.204.177 "
            cd /local/public/debian
            for suite in bookworm trixie; do
              cd dists/\$suite
              /local/generate-release.sh \$suite > Release
              cd ../..
            done
          "

      - name: Create stable distribution with proper Release file
        run: |
          ssh startcloud@66.6.204.177 "
            cd /local/public/debian/dists
            rm -rf stable 2>/dev/null || true
            cp -r trixie stable
            cd stable
            /local/generate-release.sh stable > Release
          "

      - name: Sign repository for all suites including stable
        run: |
          ssh startcloud@66.6.204.177 "
            cd /local/public/debian
            for suite in bookworm trixie stable; do
              cd dists/\$suite
              export GNUPGHOME=\$(mktemp -d /local/pgp/pgpkeys-XXXXXX)
              cat /local/pgp/pgp-key.private | gpg --import
              cat Release | gpg --default-key startcloud -abs > Release.gpg
              cat Release | gpg --default-key startcloud -abs --clearsign > InRelease
              rm -rf \$GNUPGHOME
              cd ../..
            done
          "

      - name: Cleanup temporary files
        run: |
          ssh startcloud@66.6.204.177 "rm -f /tmp/hyperweaver-server_*.deb"
