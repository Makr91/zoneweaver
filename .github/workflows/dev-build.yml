name: Development Build

on:
  workflow_call:
    inputs:
      version:
        description: 'Development version to build (optional - auto-calculated if not provided)'
        required: false
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'Development version to build (optional - auto-calculated if not provided)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-development-packages:
    name: Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set development version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            DEV_VERSION="${{ inputs.version }}"
          else
            CURRENT_VERSION=$(node -p "require('./package.json').version")
            IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
            MAJOR=${VERSION_PARTS[0]}
            MINOR=${VERSION_PARTS[1]}
            PATCH=${VERSION_PARTS[2]}
            NEW_PATCH=$((PATCH + 1))
            DEV_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          fi
          echo "VERSION=$DEV_VERSION" >> $GITHUB_ENV
          echo "PACKAGE_NAME=zoneweaver-dev" >> $GITHUB_ENV
          echo "ARCH=amd64" >> $GITHUB_ENV

      - name: Install Node.js dependencies
        run: npm ci

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Build frontend
        run: npm run build

      - name: Generate OpenAPI documentation
        run: npm run generate-docs

      - name: Install Ruby and Jekyll for documentation build
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby-full build-essential zlib1g-dev libffi-dev
          sudo gem install bundler
          bundle config set --local path 'vendor/bundle'
          bundle config set --local without 'development'
          bundle install

      - name: Build documentation site with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Bundle documentation into web build
        run: cp -r _site web/dist/docs

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Create Debian package structure
        run: |
          mkdir -p "${PACKAGE_NAME}_${VERSION}_${ARCH}"/{opt/zoneweaver/web,etc/zoneweaver,etc/systemd/system,var/lib/zoneweaver,var/log/zoneweaver,usr/share/man/man8,usr/share/man/man5,DEBIAN}

      - name: Copy application files to Debian package
        run: |
          cp -r controllers models routes auth config utils scripts index.js package.json "${PACKAGE_NAME}_${VERSION}_${ARCH}/opt/zoneweaver/"
          cp -r node_modules "${PACKAGE_NAME}_${VERSION}_${ARCH}/opt/zoneweaver/"
          cp -r web/dist "${PACKAGE_NAME}_${VERSION}_${ARCH}/opt/zoneweaver/web/dist"

      - name: Copy configuration files to Debian package
        run: |
          cp packaging/config/production-config.yaml "${PACKAGE_NAME}_${VERSION}_${ARCH}/etc/zoneweaver/config.yaml"
          cp packaging/DEBIAN/systemd/zoneweaver.service "${PACKAGE_NAME}_${VERSION}_${ARCH}/etc/systemd/system/"
          cp packaging/DEBIAN/postinst packaging/DEBIAN/prerm packaging/DEBIAN/postrm "${PACKAGE_NAME}_${VERSION}_${ARCH}/DEBIAN/"

      - name: Install man pages
        run: |
          gzip -9 -c packaging/DEBIAN/man/zoneweaver.8 > "${PACKAGE_NAME}_${VERSION}_${ARCH}/usr/share/man/man8/zoneweaver.8.gz"
          gzip -9 -c packaging/DEBIAN/man/zoneweaver.yaml.5 > "${PACKAGE_NAME}_${VERSION}_${ARCH}/usr/share/man/man5/zoneweaver.yaml.5.gz"

      - name: Create Debian control file
        run: |
          cat > "${PACKAGE_NAME}_${VERSION}_${ARCH}/DEBIAN/control" << EOF
          Package: zoneweaver-dev
          Version: ${VERSION}
          Section: misc
          Priority: optional
          Architecture: ${ARCH}
          Maintainer: Makr91 <makr91@users.noreply.github.com>
          Depends: nodejs (>= 22.0.0), sqlite3, openssl
          Conflicts: zoneweaver
          Description: Zoneweaver (Development) - Zone Hypervisor Management Interface
           Web-based management interface for Zoneweaver API hypervisors.
           This is a development build for testing purposes only.
          Homepage: https://github.com/Makr91/zoneweaver
          EOF

      - name: Set Debian package permissions
        run: |
          find "${PACKAGE_NAME}_${VERSION}_${ARCH}" -type d -exec chmod 755 {} \;
          find "${PACKAGE_NAME}_${VERSION}_${ARCH}" -type f -exec chmod 644 {} \;
          chmod 755 "${PACKAGE_NAME}_${VERSION}_${ARCH}/DEBIAN"/{postinst,prerm,postrm}

      - name: Build Debian package
        run: |
          dpkg-deb --build "${PACKAGE_NAME}_${VERSION}_${ARCH}" "${PACKAGE_NAME}_${VERSION}_${ARCH}.deb"

      #      # OmniOS Build Steps (PARKED — uncomment to resume dev .p5p builds; packaging/omnios/ is kept)
      #      - name: Build dev package on OmniOS
      #        run: |
      #          ssh ghrunner@omnios.packages.startcloud.com "cd /local/builds/zoneweaver-dev && export PATH=/opt/ooce/bin:/opt/ooce/node-22/bin:\$PATH && export MAKE=gmake && export DEV_VERSION=${VERSION} && chmod +x packaging/omnios/build.sh && ./packaging/omnios/build.sh"

      - name: Install GitHub CLI
        run: |
          if ! command -v gh &> /dev/null; then
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt update
            sudo apt install gh -y
          fi

      - name: Create development draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="v${VERSION}-dev"
          gh release delete "$RELEASE_TAG" --yes || true
          gh release create "$RELEASE_TAG" \
            --draft \
            --title "Development Release ${VERSION}" \
            --notes "Automated development build from main. Version ${VERSION}, commit ${{ github.sha }}. For testing only — use production releases for stable deployments."

      - name: Upload development package to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${VERSION}-dev" "${PACKAGE_NAME}_${VERSION}_${ARCH}.deb" --clobber

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: 'development-packages'
          path: '*.deb'
          retention-days: 30
